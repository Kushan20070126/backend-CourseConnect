spring.application.name=api-gateway
server.port=3000
# Disable the auto discovery locator: it creates routes that forward the
# /aut-svc and /course-svc prefixes WITHOUT stripping them, which made
# aut-svc receive "/aut-svc/req/signup" (not permitted -> HTTP 403).
# The explicit rewrite routes below already handle prefix stripping.
spring.cloud.gateway.discovery.locator.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
management.endpoints.web.exposure.include=gateway
management.endpoint.gateway.enabled=true
