spring.application.name=api-gateway
server.port=3000


spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true


eureka.client.service-url.defaultZone=http://svc-registry:8761/eureka/

spring.cloud.gateway.default-filters[0]=RewritePath=/(?<remaining>.*), /${remaining}
