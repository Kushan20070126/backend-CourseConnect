spring.application.name=course-svc
server.port=8082

spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=system
spring.datasource.password=root
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver


spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.prefer-ip-address=true

jwt.secret=5f2c8b9e1a4d6f70c3b8e2a9d4f1c6b7e0a3d5f8c2b9e4a7d0f3c6b1e8a5d2f9
jwt.expiration=86400000


minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=courseconnect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.file-size-threshold=1MB

stripe.api-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_SECRET_KEY}
stripe.currency=usd
app.frontend-base=http://localhost:5173

app.cors.allowed-origins=http://localhost:5173

spring.mongodb.uri=mongodb://localhost:27017/courseconnect
spring.mongodb.database=courseconnect
